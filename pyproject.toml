[tool.mypy]
strict = false
ignore_missing_imports = true
allow_untyped_defs = true
check_untyped_defs = false
follow_imports = "skip"
exclude = [
    "venv",
    "build",
    "dist",
    "lumix.egg-info",
    "tests",
    "lumix/age",
    "lumix/area",
    "lumix/bases",
    "lumix/bitrate",
    "lumix/calendar",
    "lumix/color",
    "lumix/country",
    "lumix/data",
    "lumix/date",
    "lumix/energy",
    "lumix/hash",
    "lumix/iptools",
    "lumix/language",
    "lumix/length",
    "lumix/morse",
    "lumix/passwords",
    "lumix/phonetic",
    "lumix/power",
    "lumix/pressure",
    "lumix/roman",
    "lumix/speed",
    "lumix/spoken",
    "lumix/time",
    "lumix/timezonebot",
    "lumix/timezones",
    "lumix/unitsymbols",
    "lumix/volume",
    "lumix/weight"
]
